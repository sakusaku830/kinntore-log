<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筋トレログ</title>
<style>
:root{--bg:#0e0e0e;--sf:#1a1a1a;--sf2:#242424;--ac:#e8ff00;--ac2:#ff4500;--tx:#f0f0f0;--mu:#666;--bd:#333;--gr:#39ff85}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;padding-bottom:60px}
header{padding:22px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:baseline;gap:12px}
header h1{font-size:1.9rem;font-weight:700;color:var(--ac)}
header span{font-size:.7rem;color:var(--mu)}
.tabs{display:flex;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:10}
.tab{flex:1;padding:12px 4px;font-size:.62rem;color:var(--mu);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.page{display:none;padding:16px}.page.active{display:block}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.date-nav button{background:var(--sf2);border:none;color:var(--tx);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer}
.date-display{font-size:.86rem}
.wt-card{background:var(--sf);border-radius:12px;padding:12px 16px;margin-bottom:14px;border:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.wt-lbl{font-size:.74rem;color:var(--mu);white-space:nowrap}
.wt-wrap{display:flex;align-items:center;gap:6px;flex:1}
.wt-in{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:1.3rem;font-weight:700;padding:6px 10px;width:88px;text-align:center}
.wt-in:focus{outline:none;border-color:var(--ac)}
.wt-unit{font-size:.76rem;color:var(--mu)}
.wt-prev{font-size:.68rem;color:var(--mu)}
.ex-card{background:var(--sf);border-radius:12px;margin-bottom:14px;border:1px solid var(--bd);overflow:hidden}
.ex-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--bd)}
.ex-nm{font-size:1.05rem;font-weight:700;color:var(--ac);letter-spacing:.06em}
.prev-lbl{font-size:.62rem;color:#555;margin-top:2px}
.muscle-toggle{background:none;border:none;color:var(--mu);font-size:.65rem;cursor:pointer;padding:0;margin-top:2px}
.muscle-map{display:none;padding:10px 16px 12px;border-bottom:1px solid var(--bd)}
.muscle-map.open{display:block}
.col-lbls{display:grid;grid-template-columns:26px 1fr 30px;gap:6px;padding:6px 16px 2px}
.col-lbl{font-size:.6rem;color:var(--mu);text-align:center}
.sets-area{padding:6px 16px 8px}
.set-row{display:grid;grid-template-columns:26px 1fr 30px;gap:6px;align-items:center;margin-bottom:7px}
.set-num{font-size:.66rem;color:var(--mu);text-align:center}
.set-in{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:1rem;padding:8px;text-align:center;width:100%}
.set-in:focus{outline:none;border-color:var(--ac)}
.set-in::placeholder{color:#444;font-size:.7rem}
.del-btn{background:none;border:none;color:var(--mu);font-size:.88rem;cursor:pointer;padding:4px}
.ex-foot{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px}
.add-btn{background:none;border:1px dashed var(--bd);border-radius:8px;color:var(--mu);font-size:.7rem;padding:7px;cursor:pointer;width:100%}
.rest-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-size:.76rem;padding:9px 12px;cursor:pointer;width:100%;text-align:center}
.rest-btn.running{border-color:var(--ac2);color:var(--ac2)}
.rest-btn.done{border-color:var(--gr);color:var(--gr)}
.note-in{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.76rem;padding:7px 10px;width:100%;resize:none;font-family:-apple-system,sans-serif}
.note-in:focus{outline:none;border-color:var(--ac)}
.save-btn{display:block;width:100%;padding:14px;background:var(--ac);border:none;border-radius:12px;color:#000;font-weight:700;font-size:.95rem;letter-spacing:.1em;cursor:pointer;margin-top:6px}
.t-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column}
.t-ov.on{display:flex}
.presets{display:flex;gap:10px;margin-bottom:26px}
.pr-btn{padding:8px 16px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;color:var(--mu);font-size:.74rem;cursor:pointer}
.pr-btn.on{border-color:var(--ac);color:var(--ac)}
.ring{position:relative;width:190px;height:190px;margin-bottom:26px}
.ring svg{transform:rotate(-90deg)}
.ring circle{fill:none;stroke:var(--sf2);stroke-width:10}
.ring circle.arc{stroke:var(--ac);stroke-dasharray:534;stroke-dashoffset:0;stroke-linecap:round;transition:stroke-dashoffset .95s linear}
.ring circle.arc.red{stroke:var(--ac2)}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-n{font-size:3.8rem;font-weight:700;color:var(--tx);line-height:1}
.ring-l{font-size:.66rem;color:var(--mu);letter-spacing:.14em;margin-top:4px}
.t-btns{display:flex;gap:12px}
.t-btn{padding:11px 26px;border-radius:22px;border:none;font-weight:700;font-size:.88rem;cursor:pointer}
.t-btn.y{background:var(--ac);color:#000}
.t-btn.n{background:var(--sf2);color:var(--tx)}
.m-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:20px}
.m-ov.on{display:flex}
.modal{background:var(--sf);border-radius:16px;padding:22px;width:100%;max-width:360px;border:1px solid var(--bd);max-height:85vh;overflow-y:auto}
.modal h3{font-size:.95rem;font-weight:700;color:var(--ac);margin-bottom:14px}
.m-in{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.88rem;padding:10px 12px;width:100%;margin-bottom:10px;font-family:-apple-system,sans-serif}
.m-in:focus{outline:none;border-color:var(--ac)}
.m-row{display:flex;gap:10px;margin-top:4px}
.m-btn{flex:1;padding:11px;border-radius:10px;border:none;font-weight:700;font-size:.82rem;cursor:pointer}
.m-btn.y{background:var(--ac);color:#000}
.m-btn.n{background:var(--sf2);color:var(--tx)}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ac);color:#000;padding:10px 22px;border-radius:22px;font-size:.8rem;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.h-day{margin-bottom:20px}
.h-date{font-size:.68rem;color:var(--mu);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.h-ex{background:var(--sf);border-radius:8px;padding:10px 13px;margin-bottom:7px;border-left:3px solid var(--ac)}
.h-ex-nm{font-size:.88rem;font-weight:700;color:var(--ac);margin-bottom:5px}
.h-sets{display:flex;flex-wrap:wrap;gap:5px}
.h-badge{background:var(--sf2);border-radius:6px;padding:3px 9px;font-size:.7rem;color:var(--tx)}
.h-note{font-size:.7rem;color:var(--mu);margin-top:5px;font-style:italic}
.del-day{background:none;border:none;color:var(--mu);font-size:.7rem;cursor:pointer}
.empty{text-align:center;color:var(--mu);font-size:.8rem;padding:60px 20px;line-height:2.4}
.s-sec{margin-bottom:24px}
.s-ttl{font-size:.88rem;font-weight:700;color:var(--ac);margin-bottom:11px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.s-lbl{font-size:.76rem;color:var(--mu)}
.s-val{font-size:1.25rem;font-weight:700;color:var(--tx)}
.streak{display:flex;gap:4px;flex-wrap:wrap}
.dot{width:34px;height:34px;border-radius:8px;background:var(--sf2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.62rem;color:var(--mu);gap:1px}
.dot.on{background:var(--ac);color:#000;font-weight:700}
.dot.today{border:2px solid var(--ac)}
.dot small{font-size:.48rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:.6rem;color:var(--mu);width:32px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:19px;background:var(--sf2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--ac);border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px}
.bar-v{font-size:.6rem;color:#000;font-weight:700}
.wc-wrap{background:var(--sf);border-radius:10px;padding:13px 13px 7px;border:1px solid var(--bd);margin-bottom:10px}
.set-item{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:10px;padding:12px 16px;margin-bottom:10px;border:1px solid var(--bd)}
.set-info{display:flex;align-items:center;gap:10px}
.set-em{font-size:1.25rem}
.set-nm{font-size:.88rem;font-weight:700;color:var(--tx)}
.set-btns{display:flex;gap:8px}
.ed-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-size:.7rem;padding:6px 10px;cursor:pointer}
.rm-btn{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--ac2);font-size:.7rem;padding:6px 10px;cursor:pointer}
.add-ex-btn{display:block;width:100%;background:none;border:1px dashed var(--bd);border-radius:10px;color:var(--ac);font-size:.8rem;padding:13px;cursor:pointer;margin-bottom:22px}
.sec-ttl{font-size:.72rem;font-weight:700;color:var(--mu);letter-spacing:.1em;margin-bottom:11px}
.io-btn{display:block;width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.83rem;padding:13px 16px;cursor:pointer;margin-bottom:10px;text-align:left}
.io-btn span{color:var(--mu);font-size:.7rem;display:block;margin-top:2px}
.lib-cat{font-size:.65rem;color:var(--mu);margin:10px 0 6px;letter-spacing:.08em}
.lib-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.lib-btn{padding:6px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.7rem;cursor:pointer}
.lib-btn.selected{border-color:var(--ac);color:var(--ac);background:rgba(232,255,0,.1)}
.add-tabs{display:flex;margin-bottom:14px;border-bottom:1px solid var(--bd)}
.add-tab{flex:1;padding:8px;background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-size:.75rem;cursor:pointer}
.add-tab.on{border-bottom-color:var(--ac);color:var(--ac)}
</style>
</head>
<body>
<header><h1>WORKOUT</h1><span>DAILY LOG</span></header>
<div class="tabs">
  <button class="tab active" id="tab-record" onclick="showTab('record')">&#x1F4DD; &#35352;&#37682;</button>
  <button class="tab" id="tab-history" onclick="showTab('history')">&#x1F4C5; &#23653;&#27704;</button>
  <button class="tab" id="tab-stats" onclick="showTab('stats')">&#x1F4CA; &#32113;&#35336;</button>
  <button class="tab" id="tab-settings" onclick="showTab('settings')">&#x2699;&#xFE0F; &#35373;&#23450;</button>
</div>
<div id="page-record" class="page active"></div>
<div id="page-history" class="page"></div>
<div id="page-stats" class="page"></div>
<div id="page-settings" class="page"></div>

<div class="t-ov" id="tOv">
  <div class="presets">
    <button class="pr-btn" id="p30" onclick="setP(30)">30&#31186;</button>
    <button class="pr-btn on" id="p60" onclick="setP(60)">60&#31186;</button>
    <button class="pr-btn" id="p90" onclick="setP(90)">90&#31186;</button>
    <button class="pr-btn" id="p120" onclick="setP(120)">120&#31186;</button>
  </div>
  <div class="ring">
    <svg viewBox="0 0 190 190" width="190" height="190">
      <circle cx="95" cy="95" r="85"/>
      <circle class="arc" id="arc" cx="95" cy="95" r="85"/>
    </svg>
    <div class="ring-c">
      <div class="ring-n" id="ringN">60</div>
      <div class="ring-l">REST</div>
    </div>
  </div>
  <div class="t-btns">
    <button class="t-btn n" onclick="closeTimer()">&#38281;&#12376;&#12427;</button>
    <button class="t-btn y" onclick="resetTimer()">&#12522;&#12475;&#12483;&#12488;</button>
  </div>
</div>
<div class="m-ov" id="mOv"></div>
<div class="toast" id="toast"></div>

  if(wDates.length>=2){var vals=wDates.map(function(k){return W[k]}),mn=Math.min.apply(null,vals)-.5,mx2=Math.max.apply(null,vals)+.5,PW=270,PH=65,pts=[],circles='';for(var i=0;i<vals.length;i++){var px=i/(vals.length-1)*PW,py=PH-((vals[i]-mn)/(mx2-mn)*PH);pts.push(px+','+py);var last=i===vals.length-1;circles+='<circle cx="'+px+'" cy="'+py+'" r="'+(last?4:3)+'" fill="'+(last?'var(--ac)':'var(--mu)')+'" />';if(last)circles+='<text x="'+px+'" y="'+(py-7)+'" font-size="9" fill="var(--ac)" text-anchor="middle" font-weight="bold">'+vals[i]+'kg</text>'}
  wtH='<div class="wc-wrap"><svg width="100%" viewBox="-4 -18 '+(PW+8)+' '+(PH+22)+'" style="overflow:visible"><polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--ac)" stroke-width="2" stroke-linejoin="round" opacity=".8"/>'+circles+'</svg><div style="font-size:.6rem;color:var(--mu)">\u76F4\u8FD1'+wDates.length+'\u65E5\u9593</div></div>'}
  else{wtH='<div style="font-size:.74rem;color:var(--mu);padding:8px 0">2\u65E5\u5206\u4EE5\u4E0A\u8A18\u9332\u3059\u308B\u3068\u30B0\u30E9\u30D5\u304C\u8868\u793A\u3055\u308C\u307E\u3059</div>'}
  var lwk=Object.keys(W).sort().pop(),lw2=lwk?W[lwk]:null;
  var detH='';for(var i=0;i<EX.length;i++){var ex=EX[i];detH+='<div class="s-row"><div class="s-lbl">'+ex.e+' '+ex.name+'</div><div style="text-align:right"><div class="s-val">'+st[ex.id].reps+'<span style="font-size:.68rem;color:var(--mu);margin-left:3px">\u56DE</span></div><div style="font-size:.6rem;color:var(--mu)">'+st[ex.id].sess+'\u56DE\u5B9F\u65BD / '+st[ex.id].sets+'\u30BB\u30C3\u30C8</div></div></div>'}
  document.getElementById('page-stats').innerHTML=
    '<div class="s-sec"><div class="s-ttl">\u76F4\u8FD17\u65E5</div><div class="streak">'+dotH+'</div></div>'
    +'<div class="s-sec"><div class="s-ttl">&#9878;&#65039; \u4F53\u91CD\u63A8\u79FB</div>'+wtH+(lw2?'<div class="s-row"><div class="s-lbl">\u6700\u65B0\u4F53\u91CD</div><div class="s-val">'+lw2+'<span style="font-size:.68rem;color:var(--mu);margin-left:3px">kg</span></div></div>':'')+' </div>'
    +'<div class="s-sec"><div class="s-ttl">\u5168\u4F53</div><div class="s-row"><div class="s-lbl">\u30C8\u30EC\u30FC\u30CB\u30F3\u30B0\u65E5\u6570</div><div class="s-val">'+keys.length+' \u65E5</div></div></div>'
    +'<div class="s-sec"><div class="s-ttl">\u7A2E\u76EE\u5225 \u7DCF\u56DE\u6570</div>'+barH+'</div>'
    +'<div class="s-sec"><div class="s-ttl">\u7A2E\u76EE\u5225 \u8A73\u7D30</div>'+detH+'</div>'
    +'<div class="s-sec"><div class="s-ttl">&#128170; \u7B4B\u8089\u56F3\u30B5\u30DE\u30EA\u30FC</div>'
    +'<button class="save-btn" style="margin-bottom:10px" onclick="showWeekSummary()">&#127947; \u76F4\u8FD17\u65E5\u306E\u7B4B\u8089\u56F3</button>'
    +'<div style="font-size:.7rem;color:var(--mu);margin-bottom:8px">\u7279\u5B9A\u306E\u65E5\u3092\u9078\u3076</div>'
    +'<div id="stat-date-btns" style="display:flex;flex-wrap:wrap;gap:6px">'
    +buildDateBtns(keys)
    +'</div></div>'
}
function renderSettings(){
  var EX=lex(),listH='';
  for(var i=0;i<EX.length;i++){var ex=EX[i];var eid=ex.id;listH+='<div class="set-item"><div class="set-info"><span class="set-em">'+ex.e+'</span><span class="set-nm">'+ex.name+'</span></div><div class="set-btns"><button class="ed-btn" onclick="openEdit(\''+eid+'\')" >\u7DE8\u96C6</button><button class="rm-btn" onclick="removeEx(\''+eid+'\')" >\u524A\u9664</button></div></div>'}
  document.getElementById('page-settings').innerHTML='<div class="sec-ttl">\u7A2E\u76EE\u7BA1\u7406</div>'+listH+'<button class="add-ex-btn" onclick="openAdd()">&#65291; \u7A2E\u76EE\u3092\u8FFD\u52A0</button><div class="sec-ttl">\u30C7\u30FC\u30BF</div><button class="io-btn" onclick="exportData()">&#128228; \u30C7\u30FC\u30BF\u3092\u30A8\u30AF\u30B9\u30DD\u30FC\u30C8<span>\u30D0\u30C3\u30AF\u30A2\u30C3\u30D7\u7528JSON\u30D5\u30A1\u30A4\u30EB</span></button><button class="io-btn" onclick="document.getElementById(\'importFile\').click()">&#128229; \u30C7\u30FC\u30BF\u3092\u30A4\u30F3\u30DD\u30FC\u30C8<span>\u5225\u30C7\u30D0\u30A4\u30B9\u304B\u3089\u306E\u79FB\u884C</span></button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">'
}
function buildLibModal(){
  var h='<div class="modal"><h3>\u7A2E\u76EE\u3092\u8FFD\u52A0</h3>'
    +'<div class="add-tabs"><button class="add-tab on" id="at-lib" onclick="swTab(\'lib\')">\u30EA\u30B9\u30C8\u304B\u3089\u9078\u3076</button><button class="add-tab" id="at-cus" onclick="swTab(\'cus\')">\u30AB\u30B9\u30BF\u30E0\u5165\u529B</button></div>'
    +'<div id="ap-lib">';
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci];
    h+='<div class="lib-cat">'+cat+'</div><div class="lib-btns">';
    for(var ei=0;ei<EL.length;ei++){if(EL[ei].cat!==cat)continue;var ex=EL[ei];h+='<button class="lib-btn" onclick="selLE(this)" data-n="'+ex.name+'" data-e="'+ex.e+'" data-p="'+ex.pl.join(',')+'" data-s="'+ex.sl.join(',')+'">'+ ex.e+' '+ex.name+'</button>';}
    h+='</div>';
  }
  h+='</div><div id="ap-cus" style="display:none">'
    +'<input class="m-in" id="mEm" placeholder="\u7D75\u6587\u5B57">'
    +'<input class="m-in" id="mNm" placeholder="\u7A2E\u76EE\u540D\uFF08\u4F8B: DEADLIFT\uFF09">'
    +'<input class="m-in" id="mPl" placeholder="\u30E1\u30A4\u30F3\u7B4B\u8089\uFF08\u4F8B: \u5927\u80F8\u7B4B,\u4E09\u982D\u7B4B\uFF09">'
    +'<input class="m-in" id="mSl" placeholder="\u30B5\u30DD\u30FC\u30C8\u7B4B\u8089\uFF08\u4F8B: \u4E09\u89D2\u7B4B,\u4F53\u5E79\uFF09">'
    +'</div>'
    +'<div class="m-row"><button class="m-btn n" onclick="closeModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button><button class="m-btn y" onclick="saveModal()">\u8FFD\u52A0</button></div></div>';
  return h;
}
function buildEditModal(ex){
  return'<div class="modal"><h3>\u7A2E\u76EE\u3092\u7DE8\u96C6</h3>'
    +'<input class="m-in" id="mEm" value="'+ex.e+'">'
    +'<input class="m-in" id="mNm" value="'+ex.name+'">'
    +'<input class="m-in" id="mPl" value="'+(ex.pl||[]).join(',')+'" placeholder="\u30E1\u30A4\u30F3\u7B4B\u8089">'
    +'<input class="m-in" id="mSl" value="'+(ex.sl||[]).join(',')+'" placeholder="\u30B5\u30DD\u30FC\u30C8\u7B4B\u8089">'
    +'<div class="m-row"><button class="m-btn n" onclick="closeModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button><button class="m-btn y" onclick="saveModal()">\u4FDD\u5B58</button></div></div>';
}
function swTab(t){document.getElementById('ap-lib').style.display=t==='lib'?'block':'none';document.getElementById('ap-cus').style.display=t==='cus'?'block':'none';document.getElementById('at-lib').className='add-tab'+(t==='lib'?' on':'');document.getElementById('at-cus').className='add-tab'+(t==='cus'?' on':'');}
function selLE(btn){document.querySelectorAll('.lib-btn').forEach(function(b){b.className='lib-btn'});btn.className='lib-btn selected';sLE={name:btn.getAttribute('data-n'),e:btn.getAttribute('data-e'),pl:btn.getAttribute('data-p').split(',').filter(Boolean),sl:btn.getAttribute('data-s').split(',').filter(Boolean)};}
function openAdd(){editId=null;sLE=null;document.getElementById('mOv').innerHTML=buildLibModal();document.getElementById('mOv').classList.add('on')}
function openEdit(id){editId=id;sLE=null;var EX=lex(),ex=null;for(var i=0;i<EX.length;i++)if(EX[i].id===id){ex=EX[i];break}if(!ex)return;document.getElementById('mOv').innerHTML=buildEditModal(ex);document.getElementById('mOv').classList.add('on')}
function closeModal(){document.getElementById('mOv').classList.remove('on')}
function saveModal(){
  var EX=lex();
  if(editId){var em=document.getElementById('mEm').value.trim()||'*';var nm=document.getElementById('mNm').value.trim().toUpperCase();if(!nm){toast('\u7A2E\u76EE\u540D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return}var pl=(document.getElementById('mPl').value||'').split(',').map(function(s){return s.trim()}).filter(Boolean);var sl=(document.getElementById('mSl').value||'').split(',').map(function(s){return s.trim()}).filter(Boolean);for(var i=0;i<EX.length;i++)if(EX[i].id===editId){EX[i].e=em;EX[i].name=nm;EX[i].pl=pl;EX[i].sl=sl;break}}
  else{var lP=document.getElementById('ap-lib');if(lP&&lP.style.display!=='none'){if(!sLE){toast('\u7A2E\u76EE\u3092\u9078\u3093\u3067\u304F\u3060\u3055\u3044');return}EX.push({id:'ex_'+Date.now(),name:sLE.name,e:sLE.e,pl:sLE.pl,sl:sLE.sl})}else{var em2=document.getElementById('mEm').value.trim()||'*';var nm2=document.getElementById('mNm').value.trim().toUpperCase();if(!nm2){toast('\u7A2E\u76EE\u540D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return}var pl2=(document.getElementById('mPl').value||'').split(',').map(function(s){return s.trim()}).filter(Boolean);var sl2=(document.getElementById('mSl').value||'').split(',').map(function(s){return s.trim()}).filter(Boolean);EX.push({id:'ex_'+Date.now(),name:nm2,e:em2,pl:pl2,sl:sl2})}}
  sex(EX);closeModal();renderSettings();renderRecord();toast('\u4FDD\u5B58\u3057\u307E\u3057\u305F\uFF01')
}
function removeEx(id){var EX=lex();if(EX.length<=1){toast('\u6700\u4F4E1\u7A2E\u76EE\u5FC5\u8981\u3067\u3059');return}if(!confirm('\u3053\u306E\u7A2E\u76EE\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;sex(EX.filter(function(x){return x.id!==id}));renderSettings();renderRecord();toast('\u524A\u9664\u3057\u307E\u3057\u305F')}
function exportData(){var data={workouts:ld(),weights:lw(),exercises:lex()};var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='kinntore-backup.json';a.click();URL.revokeObjectURL(url)}
function importData(ev){var file=ev.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var data=JSON.parse(e.target.result);if(data.workouts)sd(data.workouts);if(data.weights)sw(data.weights);if(data.exercises)sex(data.exercises);toast('\u30A4\u30F3\u30DD\u30FC\u30C8\u5B8C\u4E86\uFF01');renderRecord();renderHistory();renderStats();renderSettings()}catch(err){toast('\u8AAD\u307F\u8FBC\u3081\u307E\u305B\u3093\u3067\u3057\u305F')}};reader.readAsText(file);ev.target.value=''}
function showTab(name){var ns=['record','history','stats','settings'];for(var i=0;i<ns.length;i++){var t=document.getElementById('tab-'+ns[i]),p=document.getElementById('page-'+ns[i]);if(ns[i]===name){t.classList.add('active');p.classList.add('active')}else{t.classList.remove('active');p.classList.remove('active')}}if(name==='settings')renderSettings()}
function toast(msg){var t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2400)}
document.getElementById('tOv').addEventListener('click',function(ev){if(ev.target===this)closeTimer()});
document.getElementById('mOv').addEventListener('click',function(ev){if(ev.target===this)closeModal()});
renderRecord();renderHistory();renderStats();updT();

</script>
